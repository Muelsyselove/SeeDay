name: Release SeeDay

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: v1.6.0)'
        required: false
        type: string
      prerelease:
        description: '是否为预发布版本'
        required: false
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Accept SDK licenses
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses || true

      - name: Install Android SDK components
        run: |
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-34" "build-tools;34.0.0" || true

      - name: Decode Keystore
        run: |
          printf '%s' "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > agents/android-agent/release.keystore

      - name: Generate Gradle wrapper
        run: |
          cd agents/android-agent
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            mkdir -p gradle/wrapper
            curl -fSL "https://github.com/gradle/gradle/raw/v8.5.0/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar
          fi

      - name: Build Debug APK
        id: debug
        continue-on-error: true
        working-directory: agents/android-agent
        env:
          KEYSTORE_FILE: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build Release APK
        if: always() && steps.debug.outcome == 'success'
        id: release
        continue-on-error: true
        working-directory: agents/android-agent
        env:
          KEYSTORE_FILE: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload Debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: agents/android-agent/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 1

      - name: Upload Release APK
        if: steps.release.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: agents/android-agent/app/build/outputs/apk/release/*.apk
          retention-days: 1

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd agents/windows
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build Windows Agent
        run: |
          cd agents/windows
          python -m PyInstaller --onefile --noconsole --name SeeDay-Agent agent.py

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: agents/windows/dist/SeeDay-Agent.exe
          retention-days: 1

  create-release:
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -20

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.event.inputs.version || github.ref_name }}
          name: SeeDay ${{ github.event.inputs.version || github.ref_name }}
          artifacts: "artifacts/android-debug-apk/*.apk,artifacts/android-release-apk/*.apk,artifacts/windows-exe/*.exe"
          artifactErrorsFailBuild: false
          prerelease: ${{ github.event.inputs.prerelease == 'true' || github.event.inputs.prerelease == true || contains(github.ref_name, 'rc') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
          generateReleaseNotes: true
          omitBody: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
