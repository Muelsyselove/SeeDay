name: Build Android Agent APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: v0.1.0)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Accept SDK licenses
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses || true

      - name: Install Android SDK components
        run: |
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-34" "build-tools;34.0.0" || true

      - name: Generate Gradle wrapper
        run: |
          cd agents/android-agent
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            mkdir -p gradle/wrapper
            curl -fSL "https://github.com/gradle/gradle/raw/v8.5.0/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar
          fi

      - name: Build Debug APK
        id: debug
        continue-on-error: true
        working-directory: agents/android-agent
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build Release APK
        if: always() && steps.debug.outcome == 'success'
        id: release
        continue-on-error: true
        working-directory: agents/android-agent
        run: |
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload Debug APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SeeDay-Agent-Android-debug
          path: agents/android-agent/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Release APK artifact
        if: steps.release.outcome == 'success' && hashFiles('agents/android-agent/app/build/outputs/apk/release/*.apk') != ''
        uses: actions/upload-artifact@v4
        with:
          name: SeeDay-Agent-Android-release
          path: agents/android-agent/app/build/outputs/apk/release/*.apk
          retention-days: 30
