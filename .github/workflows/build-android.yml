name: Build Android Agent APK

on:
  push:
    tags:
      - 'v*'
    paths:
      - 'agents/android-agent/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: v0.1.0)'
        required: false
        type: string
      prerelease:
        description: '是否为预发布版本'
        required: false
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Install Android SDK platform and build tools
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Generate Gradle wrapper
        run: |
          cd agents/android-agent
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            mkdir -p gradle/wrapper
            gradle wrapper --gradle-version 8.5 2>&1 || {
              curl -fSL "https://github.com/gradle/gradle/raw/v8.5.0/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar
            }
          fi

      - name: Build Debug APK
        working-directory: agents/android-agent
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build Release APK
        working-directory: agents/android-agent
        run: |
          ./gradlew assembleRelease --no-daemon --stacktrace || true

      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SeeDay-Agent-Android-debug
          path: agents/android-agent/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Release APK artifact
        uses: actions/upload-artifact@v4
        if: ${{ hashFiles('agents/android-agent/app/build/outputs/apk/release/*.apk') != '' }}
        with:
          name: SeeDay-Agent-Android-release
          path: agents/android-agent/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          name: SeeDay ${{ github.event.inputs.version || github.ref_name }}
          files: agents/android-agent/app/build/outputs/apk/debug/*.apk
          prerelease: ${{ github.event.inputs.prerelease == 'true' || github.event.inputs.prerelease == true || contains(github.ref_name, 'rc') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
