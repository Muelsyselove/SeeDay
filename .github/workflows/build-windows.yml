name: Build & Release Windows Agent

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: v0.1.0)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd agents/windows
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build Windows Agent
        run: |
          cd agents/windows
          python -m PyInstaller --onefile --noconsole --name SeeDay-Agent agent.py
