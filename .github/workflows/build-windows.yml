name: Build & Release Windows Agent

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: v0.1.0-rc.1)'
        required: true
        type: string
      prerelease:
        description: '是否为预发布版本'
        required: true
        type: boolean
        default: true

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd agents/windows
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build Windows Agent
        run: |
          cd agents/windows
          python -m PyInstaller --onefile --noconsole --name SeeDay-Agent agent.py

      - name: Create Tag (if triggered manually)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ github.event.inputs.version }}
          git push origin ${{ github.event.inputs.version }}

      - name: Create Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: SeeDay ${{ github.event.inputs.version }}
          files: agents/windows/dist/SeeDay-Agent.exe
          prerelease: ${{ github.event.inputs.prerelease }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
